name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: release on npm
        run: |
          npm install --package-lock-only
          npm audit --audit-level=critical
          npm ci
          npm run lint
          npm run test
          npm run build
      - run: npm publish